hostname_additional_hosts:
  - ip_address: 212.227.166.233
    hostname: deb1202.imsawadogo.com
    hostname_short: deb1202
  # - ip_address: 5.6.7.8
  #   hostname: b.example.com
  #   hostname_short: b
  #
#
ansible_become_pass: "{{ deb12_02_become_pass }}"
#
#  ## PRVS | CONFIG  ###
prvs_copy_home: true  # Copy default user's home files in place
prvs_root_passwd: true  # update root passward
#
dkr_copy_def_files: true  # Copy default docker files to target server
dkr_copy_etx_files: no  #  # Copy extended docker files to target host
#
dckr_fldr_lst:  # Docker folder list that will be copied when set in the host variable
  - { fldr: "deb1202" }

#
crntb_activate_cronjobs: no
#
#
#  ## APT | PACKAGES INSTALL  ###
instl_def_pckg: true  # Install complete packages. A 'no' will remove it from the host (apt_def_pckg_lst)
instl_utl_pckg: no  # Install complete packages. A 'no' will remove it from the host (apt_util_lst)
sysd_strt_srvc: true  # Start services
instl_ansbl_pckg: no  # Install ansible using PIP (pip_ansbl_pckg_lst apt_ansbl_pckg_lst)
instl_docker_pckg: true  # Install Docker package (apt_docker_pckg_lst)
apt_host_pckg_lst:  # Install Host Specific Packages (keep this empty. use host_var to overwrite it)
  - crontab
#
#
instl_swrm_node: true  # Install Docker swarm Service
#
addresolv: true  # add cloudflare ad dns resolv address temporary to resolv.conf
#
addLocalUser: true  # add a local user to specific host
#
localusers:
  - name: joe
    shell: /bin/bash
    group: joe
    groups:
      - sudo
    append: true
    state: absent
    key: joe.pub
    create_home: true
    local: true
    hosts: deb1202
    bashrc: /home/ibrahim/sandbox/myAnsible/configs/files/home/ibrahim/.bashrc
