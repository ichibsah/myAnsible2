---
# ==========================================================
# Role tasks: Deploy Semaphore + MySQL via docker_compose
# with pre-checks for image updates and safe rolling replace.
# All variables are loaded from: defaults/vars.yml
# ==========================================================

# 0) Load all variables from role defaults (as you requested)
- name: Load role defaults
  ansible.builtin.include_vars:
    file: defaults/semaphore.yml

# 1) Define sane defaults if not provided in defaults/vars.yml
#    (This keeps the role runnable even if some vars are missing)
- name: Set fallback defaults for key variables
  ansible.builtin.set_fact:
    project_name: "{{ project_name | default('semaphore') }}"
    base_dir: "{{ base_dir | default('/opt/docker/semaphore-3002') }}"
    mysql_image: "{{ mysql_image | default('mysql:latest') }}"
    semaphore_image: "{{ semaphore_image | default('semaphoreui/semaphore:latest') }}"
    mysql_container_name: "{{ mysql_container_name | default('ansiblemysql') }}"
    semaphore_container_name: "{{ semaphore_container_name | default('ansiblesemaphore') }}"
    semaphore_port_host: "{{ semaphore_port_host | default(3002) }}"
    semaphore_port_container: "{{ semaphore_port_container | default(3000) }}"
    #semaphore_run_as_user: "{{ semaphore_run_as_user | default(omit) }}"  # e.g. '1000:1000' if you want to set it
    semaphore_run_as_user: "{{ semaphore_run_as_user | default('1000:1000') }}"  # e.g. '1000:1000' if you want to set it
    semaphore_access_key_encryption: "{{ semaphore_access_key_encryption | default('') }}"
    mysql_db_name: "{{ mysql_db_name | default('semaphore') }}"
    mysql_db_user: "{{ mysql_db_user | default('semaphore') }}"
    semaphore_admin_name: "{{ semaphore_admin_name | default('admin') }}"
    semaphore_admin_email: "{{ semaphore_admin_email | default('admin@localhost') }}"
    semaphore_admin_user: "{{ semaphore_admin_user | default('admin') }}"
    ansible_host_key_checking: "{{ ansible_host_key_checking | default(false) }}"
    mysql_data_volume: "{{ mysql_data_volume | default(base_dir + '/semaphore-mysql:/var/lib/mysql') }}"
    inventory_volume: "{{ inventory_volume | default(base_dir + '/inventory:/inventory:ro') }}"
    authorized_keys_volume: "{{ authorized_keys_volume | default(base_dir + '/authorized-keys:/authorized-keys:ro') }}"
    config_volume: "{{ config_volume | default(base_dir + '/config:/etc/semaphore:rw') }}"
    tmp_volume: "{{ tmp_volume | default(base_dir + '/tmp:/tmp:rw') }}"

# 2) Inspect current local images (before pulling) so we can compare later
- name: Inspect current local MySQL image (if present)
  community.docker.docker_image_info:
    name: "{{ mysql_image }}"
  register: mysql_current
  failed_when: false

- name: Inspect current local Semaphore image (if present)
  community.docker.docker_image_info:
    name: "{{ semaphore_image }}"
  register: semaphore_current
  failed_when: false

# 3) Pull fresh images (force a check against registry)
- name: Pull latest MySQL image (force check)
  community.docker.docker_image:
    name: "{{ mysql_image }}"
    source: pull
    force_source: true
  register: mysql_pulled

- name: Pull latest Semaphore image (force check)
  community.docker.docker_image:
    name: "{{ semaphore_image }}"
    source: pull
    force_source: true
  register: semaphore_pulled

# 4) Decide whether an update is required (if either image changed)
- name: Determine if any image was updated
  ansible.builtin.set_fact:
    update_required: "{{ (mysql_pulled.changed | default(false)) or (semaphore_pulled.changed | default(false)) }}"

# 5) (Optional) Debug summary of image change state
- name: Show image change summary
  ansible.builtin.debug:
    msg:
      mysql_image_changed: "{{ mysql_pulled.changed | default(false) }}"
      semaphore_image_changed: "{{ semaphore_pulled.changed | default(false) }}"
      update_required: "{{ update_required }}"

# 6) Stop running containers if an update is required (safe stop)
- name: Stop MySQL and Semaphore containers (only if an image update is required)
  community.docker.docker_container:
    name: "{{ item }}"
    state: stopped
  loop:
    - "{{ mysql_container_name }}"
    - "{{ semaphore_container_name }}"
  when: update_required

# 7) Prune old/dangling images (only when update happened)
#    This removes the "old current" image if it was replaced by the new latest digest.
- name: Prune dangling/unused images after update
  community.docker.docker_prune:
    images: true
    images_filters:
      dangling: true
  when: update_required

# 8) Deploy (or re-deploy) using your original docker_compose definition
#    NOTE: We keep your password usage (ansible_become_pass) but recommend Ansible Vault.
- name: Job 00 | Deploy Semaphore stack via docker_compose
  community.docker.docker_compose:
    project_name: "{{ project_name }}"
    definition:
      version: "2"
      services:
        mysql:
          container_name: "{{ mysql_container_name }}"
          image: "{{ mysql_image }}"
          hostname: "mysql"
          volumes:
            - "{{ mysql_data_volume }}"
          environment:
            MYSQL_RANDOM_ROOT_PASSWORD: "yes"
            MYSQL_DATABASE: "{{ mysql_db_name }}"
            MYSQL_USER: "{{ mysql_db_user }}"
            # TODO: Move to Ansible Vault. Currently using become password as requested.
            MYSQL_PASSWORD: "{{ ansible_become_pass }}"
          restart: always
        semaphore:
          container_name: "{{ semaphore_container_name }}"
          image: "{{ semaphore_image }}"
          #{% if semaphore_run_as_user is defined %}
          user: "{{ semaphore_run_as_user }}"
          #{% endif %}
          ports:
            - "{{ semaphore_port_host }}:{{ semaphore_port_container }}"
          environment:
            SEMAPHORE_DB_USER: "{{ mysql_db_user }}"
            SEMAPHORE_DB_PASS: "{{ ansible_become_pass }}"   # TODO: Vault
            SEMAPHORE_DB_HOST: "mysql"
            SEMAPHORE_DB_PORT: "3306"
            SEMAPHORE_DB_DIALECT: "mysql"
            SEMAPHORE_DB: "{{ mysql_db_name }}"
            SEMAPHORE_PLAYBOOK_PATH: "/tmp/semaphore/"
            SEMAPHORE_ADMIN_PASSWORD: "{{ ansible_become_pass }}"  # TODO: Vault
            SEMAPHORE_ADMIN_NAME: "{{ semaphore_admin_name }}"
            SEMAPHORE_ADMIN_EMAIL: "{{ semaphore_admin_email }}"
            SEMAPHORE_ADMIN: "{{ semaphore_admin_user }}"
            SEMAPHORE_ACCESS_KEY_ENCRYPTION: "{{ semaphore_access_key_encryption }}"
            ANSIBLE_HOST_KEY_CHECKING: "{{ (ansible_host_key_checking | bool) | ternary('true','false') }}"
          volumes:
            - "{{ inventory_volume }}"
            - "{{ authorized_keys_volume }}"
            - "{{ config_volume }}"
            - "{{ tmp_volume }}"
          restart: always
          depends_on:
            - mysql
  register: compose_result

# 9) Verify containers are up and running via container inspection (more reliable than parsing compose output)
- name: Gather container info for MySQL and Semaphore
  community.docker.docker_container_info:
    name: "{{ item }}"
  loop:
    - "{{ mysql_container_name }}"
    - "{{ semaphore_container_name }}"
  register: containers_info

- name: Assert MySQL and Semaphore containers are running
  ansible.builtin.assert:
    that:
      - "containers_info.results | selectattr('containers', 'defined') | map(attribute='containers') | map('first') | selectattr('Name', 'defined') | list | length == 2"
      - "(containers_info.results[0].containers[0].State.Running) | default(false)"
      - "(containers_info.results[1].containers[0].State.Running) | default(false)"
    fail_msg: "One or more containers are not running as expected."
    success_msg: "MySQL and Semaphore are running."

# (Optional) Also surface compose_result if you want it for other tasks
- name: Debug compose_result summary (optional)
  ansible.builtin.debug:
    var: compose_result
  tags: [never, debug]