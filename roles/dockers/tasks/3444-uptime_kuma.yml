# Job 03 | Deploy uptimekuma with update-aware, idempotent logic
# Collection requirement: community.docker
#
- include_vars: defaults/uptimekuma.yml
#
- name: "Job 03 | Deploy uptimekuma | update-aware compose deployment"
  vars:
    # === Your existing vars (kept) ===
    working_dir: "{{ dckr_bs_pth }}/uptimekuma-3444/"
    log_dir: "{{ working_dir }}logs"
    prg_name: "uptimekuma"
    con_name: "{{ prg_name }}_con"

    # === Image parameters (explicit for clarity) ===
    uk_image_name: "louislam/uptime-kuma"
    uk_image_tag: "latest"
    uk_image_full: "{{ uk_image_name }}:{{ uk_image_tag }}"
    uk_timezone: "Europe/Berlin"
  block:
    # 1) Pull the latest image (force pull to check for updates)
    - name: "Pull latest uptime-kuma image (force)"
      community.docker.docker_image:
        name: "{{ uk_image_name }}"
        tag: "{{ uk_image_tag }}"
        source: pull
        force_source: true
      register: uk_image_pull

    # 2) Check if the container already exists
    - name: "Check if {{ con_name }} container exists"
      community.docker.docker_container_info:
        name: "{{ con_name }}"
      register: uk_container_info

    # 3) If a new image was pulled and the container exists, stop and remove the container
    - name: "Stop {{ con_name }} if running (only when image updated)"
      community.docker.docker_container:
        name: "{{ con_name }}"
        state: stopped
      when:
        - uk_image_pull.changed
        - uk_container_info.exists | default(false)

    - name: "Remove {{ con_name }} (only when image updated)"
      community.docker.docker_container:
        name: "{{ con_name }}"
        state: absent
        force_kill: true
      when:
        - uk_image_pull.changed
        - uk_container_info.exists | default(false)

    # 4) If a new image was pulled, prune old/dangling images
    - name: "Prune dangling images (only when image updated)"
      community.docker.docker_prune:
        images: true
        images_filters:
          dangling: true
      when: uk_image_pull.changed

    # 5) Deploy the container via compose, recreate only if image updated
    - name: "Deploy uptimekuma via compose (conditional recreate)"
      community.docker.docker_compose:
        project_name: "{{ prg_name }}"
        definition:
          version: "3.9"
          services:
            uptimekuma:
              # NOTE: 'hostname' is typically a short host name; leaving your original value unchanged
              hostname: "https://{{ prg_name }}{{ dmain_pstfx }}"
              container_name: "{{ con_name }}"
              image: "{{ uk_image_full }}"
              ports:
                - "3444:3001"
              restart: always
              environment:
                - "TZ={{ uk_timezone }}"
              user: "0:0" # root
              volumes:
                - "{{ working_dir }}uptimekuma:/app/data"
                - "/var/run/docker.sock:/var/run/docker.sock"
        # Only recreate when a new image was actually pulled
        recreate: "{{ 'always' if uk_image_pull.changed else 'never' }}"
        remove_orphans: true
      register: uk_compose_out

    # Verification: ensure container is running
    - name: "Fetch container state after deployment"
      community.docker.docker_container_info:
        name: "{{ con_name }}"
      register: uk_post_info

    - name: "Verify that uptimekuma is running"
      ansible.builtin.assert:
        that:
          - uk_post_info.exists
          - uk_post_info.container.State.Running | default(false)
        fail_msg: "uptimekuma is NOT running after deployment."
        success_msg: "uptimekuma is running."
