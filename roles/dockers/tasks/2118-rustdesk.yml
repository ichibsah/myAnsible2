---
# Load all role variables
- name: Load variables
  ansible.builtin.include_vars:
    file: defaults/rustdesk.yml

#  ###############################################################################
# STEP 1 — Pull fresh image and check whether it differs from the current one
#  ###############################################################################

# Pull the latest image from registry without running containers yet
- name: Pull latest rustdesk image
  community.docker.docker_image:
    name: rustdesk/rustdesk-server:latest
    source: pull
  register: new_image

# Gather info on the currently installed image (if any)
- name: Inspect currently installed rustdesk image
  community.docker.docker_image_info:
    name: rustdesk/rustdesk-server:latest
  register: current_image
  ignore_errors: true

# Compare digests and decide if update is required
- name: Determine if image has changed
  ansible.builtin.set_fact:
    image_changed: "{{ (current_image.images | length > 0) and (new_image.image.Id != current_image.images[0].Id) }}"

#  ###############################################################################
# STEP 2 — If image changed: stop & remove containers + remove old image
#  ###############################################################################

- name: Stop existing containers (only if image updated)
  community.docker.docker_compose:
    project_src: "{{ dckr_bs_pth }}/rustdesk-21118/"
    state: stopped
  when: image_changed
  ignore_errors: true

- name: Remove existing containers (only if image updated)
  community.docker.docker_compose:
    project_src: "{{ dckr_bs_pth }}/rustdesk-21118/"
    state: absent
  when: image_changed
  ignore_errors: true

- name: Remove old rustdesk image (only if image updated)
  community.docker.docker_image:
    name: rustdesk/rustdesk-server:latest
    state: absent
  when: image_changed
  ignore_errors: true

#  ###############################################################################
# STEP 3 — Deploy your RustDesk containers using docker_compose definition
#  ###############################################################################

- name: Job 03 | Deploy rustdesk | deploy container
  vars:
    working_dir: "{{ dckr_bs_pth }}/rustdesk-21118/"
    log_dir: "{{ working_dir }}/logs"
    prg_name: "rustdesk-21118"
    con_name: "{{ prg_name }}_con"
  community.docker.docker_compose:
    project_name: "{{ prg_name }}"
    definition:
      version: "3.9"
      services:
        hbbs:
          container_name: hbbs
          image: rustdesk/rustdesk-server:latest
          environment:
            - ALWAYS_USE_RELAY=Y
          command: hbbs
          volumes:
            - "{{ working_dir }}/data:/root"
          network_mode: "host"
          depends_on:
            - hbbr
          restart: unless-stopped

        hbbr:
          container_name: hbbr
          image: rustdesk/rustdesk-server:latest
          command: hbbr
          volumes:
            - "{{ working_dir }}/data:/root"
          network_mode: "host"
          restart: unless-stopped
  register: output

#  ###############################################################################
# STEP 4 — Verify services started successfully
#  ###############################################################################

- name: Verify that rustdesk containers are running
  ansible.builtin.assert:
    that:
      - output.services.hbbs.state.running
      - output.services.hbbr.state.running
    fail_msg: "RustDesk containers NOT running correctly!"
    success_msg: "RustDesk containers are running successfully."
  tags:
    - assert
#  ###############################################################################
# Notes:
#
# Required ports:
# hbbs:
#   21114 TCP – web console (Pro only)
#   21115 TCP – NAT test
#   21116 TCP/UDP – registration, heartbeat, hole punching
#   21118 TCP – web clients
# hbbr:
#   21117 TCP – Relay service
#   21119 TCP – web clients
#
#  ###############################################################################
