# This Ansible task file deploys the nginx-proxy-manager container with the following logic:
# 1. Pull the latest image from the registry (force pull to check for updates).
# 2. Check if the container already exists.
# 3. If a new image was pulled and the container exists, stop and remove the container.
# 4. If a new image was pulled, prune old/dangling images.
# 5. Deploy the container using your original spec, with conditional recreate based on image update
# This ensures that the container is only recreated when a new image is available, making the deployment idempotent and efficient.
# Note: This task assumes you have the community.docker collection installed and configured on your Ansible controller.
# Load variables specific to nginx_proxy_manager
# This should include variables like:
# - npm_image_name
# - npm_image_tag
# - npm_container_name
# - npm_image_full (e.g., "{{ npm_image_name }}:{{ npm_image_tag }}")
# - npm_workdir
# - npm_data_dir
# - npm_letsencrypt_dir
# - npm_timezone
# Adjust the variable names as needed to match your actual variable definitions.
# Example variable definitions (these should be in your defaults/nginx_proxy_manager.yml or host_vars):
# npm_image_name: "jc21/nginx-proxy-manager"
# npm_image_tag: "latest"
# npm_image_full: "{{ npm_image_name }}:{{ npm_image_tag }}"
# npm_container_name: "nginx-proxy-manager"
# npm_workdir: "/app"
# npm_data_dir: "/opt/docker/nginx-proxy-manager/data"
# npm_letsencrypt_dir: "/opt/docker/nginx-proxy-manager/letsencrypt"
# npm_timezone: "Africa/Accra"
# Load role defaults (if not already loaded)
#
- include_vars: defaults/nginx_proxy_manager.yml
#
# -----------------------------
# [1] Pull latest image FIRST
# -----------------------------
- name: Pull latest Nginx Proxy Manager image
  community.docker.docker_image:
    name: "{{ npm_image_name }}"
    tag: "{{ npm_image_tag }}"
    source: pull  # Comment: Forces a pull from the registry
    force_source: true  # Comment: Ensures we check for updates even if present locally
  register: npm_image_pull

  # Comment: This will set npm_image_pull.changed = true if a newer image was downloaded.

# -----------------------------
# [2] Detect if container exists
# -----------------------------
- name: Check if the NPM container exists
  community.docker.docker_container_info:
    name: "{{ npm_container_name }}"
  register: npm_container_info

  # Comment: We need this so we can stop/remove the container conditionally.

# -------------------------------------------------------
# [3] If the image was updated, stop and remove container
# -------------------------------------------------------
- name: Stop NPM container if running (only when a new image was pulled)
  community.docker.docker_container:
    name: "{{ npm_container_name }}"
    state: stopped
    stop_timeout: 30
  when:
    - npm_image_pull.changed
    - npm_container_info.exists
  # Comment: We explicitly stop the container because you asked to "stop the running container".

- name: Remove NPM container (only when a new image was pulled)
  community.docker.docker_container:
    name: "{{ npm_container_name }}"
    state: absent
    force_kill: true
  when:
    - npm_image_pull.changed
    - npm_container_info.exists
  # Comment: Remove the container so the next run will recreate it against the fresh image.

# -------------------------------------------------------
# [4] Clean up old images (only when updated)
# -------------------------------------------------------
- name: Prune old/dangling Docker images after image update
  community.docker.docker_prune:
    images: true
    containers: false
    networks: false
    volumes: false
    builder_cache: false
    filters:
      dangling:
        - "true"
  when:
    - npm_image_pull.changed
  # Comment: When 'latest' moves, the prior image typically becomes 'dangling'. This removes it as requested.

# -------------------------------------------------------
# [5] (Re)deploy the container using your original spec
#     - If image is new: this creates a fresh container.
#     - If image is same: this ensures the container is present/running (no recreate).
# -------------------------------------------------------
- name: Job 00 | Deploy nginx_proxy_manager (idempotent)
  community.docker.docker_container:
    name: "{{ npm_container_name }}"
    image: "{{ npm_image_full }}"
    working_dir: "{{ npm_workdir }}"
    # Ports mapping: host:container
    ports:
      - "8081:81"
      - "80:80"
      - "443:443"
    volumes:
      - "{{ npm_data_dir }}:/data:rw"
      - "{{ npm_letsencrypt_dir }}:/etc/letsencrypt"
      - "/etc/localtime:/etc/localtime:ro"
    env:
      TZ: "{{ npm_timezone }}"
    restart_policy: always
    state: started
    recreate: "{{ npm_image_pull.changed | default(false) }}"
    # ^ Comment: If new image was pulled, recreate the container to use it.
    pull: no
    # ^ Comment: We already explicitly pulled above; avoid implicit pulls here.

  # Comment: This preserves your original task’s behavior and only recreates when a new image is available.

