# Job 00 | Pi-hole — rolling update, recreate only when the image changes
# Requires: community.docker collection

- name: Ensure Pi-hole image is up-to-date (force pull)
  community.docker.docker_image:
    name: pihole/pihole
    tag: latest
    source: pull
    force_source: true
  register: pihole_image

- name: Check if the Pi-hole container exists
  community.docker.docker_container_info:
    name: pihole
  register: pihole_info

- name: Stop and remove current Pi-hole container if a new image was pulled
  community.docker.docker_container:
    name: pihole
    state: absent
  when:
    - pihole_image.changed
    - pihole_info.exists

- name: Prune dangling images when a new image was pulled
  community.docker.docker_prune:
    images: true
    images_filters:
      dangling: true
  when: pihole_image.changed

- name: Job 00 | Deploy Pi-hole (create or start; recreate only if image changed)
  community.docker.docker_container:
    working_dir: "/opt/docker/"
    name: pihole
    image: "pihole/pihole:latest"
    hostname: "pihole.skyline.lan"

    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80"

    restart_policy: always

    env:
      TZ: "Europe/Berlin"
      #VIRTUAL_HOST: "pihole.skyline.lan"
      #VIRTUAL_HOST: "{{ hostname_additional_hosts[0].hostname }}"
      #PROXY_LOCATION: "{{ hostname_additional_hosts[0].hostname }}"
      ServerIP: "{{ hostname_additional_hosts[0].ip_address }}"
      dns: "1.1.1.1"
      WEBPASSWORD: "{{ ansible_become_pass }}"   # change if needed
      DNSSEC: "true"
      WEBTHEME: "default-dark"

    volumes:
      - "/opt/docker/pihole-8080/etc:/etc/pihole"
      - "/opt/docker/pihole-8080/dnsmasq:/etc/dnsmasq.d"

    # Only recreate the container when a new image has been pulled
    recreate: "{{ pihole_image.changed }}"
    pull: false
    state: started