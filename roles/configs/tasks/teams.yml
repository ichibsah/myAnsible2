- name: Remove old teams-for-linux repo files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/teams-for-linux.list
    - /etc/apt/sources.list.d/teams-for-linux-beta.list
    - /etc/apt/sources.list.d/teams-for-linux-packages.list
    - /etc/apt/sources.list.d/teams-for-linux.sources

- name: Install teams-for-linux APT key
  ansible.builtin.get_url:
    url: https://repo.teamsforlinux.de/key.gpg
    dest: /usr/share/keyrings/teams-for-linux.gpg
    mode: "0644"

- name: Set repository filename based on channel
  ansible.builtin.set_fact:
    teams_repo_filename: >-
      {{ 'teams-for-linux-beta'
         if teams_for_linux_channel == 'beta'
         else 'teams-for-linux' }}

- name: Add teams-for-linux APT repository
  ansible.builtin.apt_repository:
    repo: >
      deb [arch={{ ansible_architecture }}
      signed-by=/usr/share/keyrings/teams-for-linux.gpg]
      https://repo.teamsforlinux.de/debian
      {{ teams_for_linux_channel }} main
    filename: "{{ teams_repo_filename }}"
    state: present

- name: Add teams-for-linux repository
  ansible.builtin.apt_repository:
    repo: >
      deb [signed-by=/etc/apt/keyrings/teams-for-linux.asc]
      https://repo.teamsforlinux.de/debian
      stable main
    filename: teams-for-linux
    state: present

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
