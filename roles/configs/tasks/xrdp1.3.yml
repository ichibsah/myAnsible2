- name: Gather installed packages
  package_facts:
    manager: auto

# --------------------------------------------------
# Remove GNOME if present
# --------------------------------------------------
- name: Remove GNOME if installed
  apt:
    name:
      - gnome
      - gdm3
      - gnome-shell
      - gnome-session
      - gnome-remote-desktop
    state: absent
    purge: yes
  when: "'gnome-shell' in ansible_facts.packages"

- name: Autoremove unused packages
  apt:
    autoremove: yes

# --------------------------------------------------
# Install XRDP + XFCE + Fail2ban
# --------------------------------------------------
- name: Install required packages
  apt:
    name:
      - xrdp
      - xfce4
      - xfce4-goodies
      - fail2ban
    update_cache: yes
    state: present

# --------------------------------------------------
# Enable services
# --------------------------------------------------
- name: Enable and start xrdp
  systemd:
    name: xrdp
    enabled: yes
    state: started

- name: Enable and start fail2ban
  systemd:
    name: fail2ban
    enabled: yes
    state: started

# --------------------------------------------------
# Lock root account (strong protection)
# --------------------------------------------------
- name: Lock root account
  command: passwd -l root
  changed_when: false

# --------------------------------------------------
# Disable root login via XRDP (PAM)
# --------------------------------------------------
- name: Disable root login via XRDP
  lineinfile:
    path: /etc/pam.d/xrdp-sesman
    line: "auth required pam_succeed_if.so user != root"
    create: yes

# --------------------------------------------------
# XRDP TLS permission fix
# --------------------------------------------------
- name: Add xrdp user to ssl-cert group
  user:
    name: xrdp
    groups: ssl-cert
    append: yes

# --------------------------------------------------
# Configure XFCE session
# --------------------------------------------------
- name: Set default XFCE session
  copy:
    dest: /etc/skel/.xsession
    content: |
      startxfce4
    mode: '0644'

- name: Ensure XFCE session for users
  shell: |
    if [ ! -f ~/.xsession ]; then
      echo "startxfce4" > ~/.xsession
    fi
  args:
    executable: /bin/bash

# --------------------------------------------------
# XRDP startup script
# --------------------------------------------------
- name: Configure startwm.sh
  copy:
    dest: /etc/xrdp/startwm.sh
    mode: '0755'
    content: |
      #!/bin/sh

      if [ -r /etc/profile ]; then
        . /etc/profile
      fi

      if [ -r ~/.profile ]; then
        . ~/.profile
      fi

      exec startxfce4
  notify: Restart xrdp

# --------------------------------------------------
# Detect firewall tools
# --------------------------------------------------
- name: Check if iptables exists
  command: which iptables
  register: iptables_check
  changed_when: false
  failed_when: false

- name: Check if ufw exists
  command: which ufw
  register: ufw_check
  changed_when: false
  failed_when: false

# --------------------------------------------------
# Apply firewall rules (prefer iptables)
# --------------------------------------------------
- name: Allow RDP via iptables
  shell: |
    iptables -C INPUT -p tcp --dport 3389 -j ACCEPT || \
    iptables -A INPUT -p tcp --dport 3389 -j ACCEPT
  when: iptables_check.rc == 0

- name: Save iptables rules
  shell: |
    mkdir -p /etc/iptables
    iptables-save > /etc/iptables/rules.v4
  when: iptables_check.rc == 0

- name: Allow RDP via UFW fallback
  ufw:
    rule: allow
    port: '3389'
    proto: tcp
  when:
    - iptables_check.rc != 0
    - ufw_check.rc == 0

# --------------------------------------------------
# FAIL2BAN CONFIGURATION
# --------------------------------------------------
- name: Create fail2ban jail.local
  copy:
    dest: /etc/fail2ban/jail.local
    mode: '0644'
    content: |
      [DEFAULT]
      bantime = 1h
      findtime = 10m
      maxretry = 5
      backend = systemd

      [xrdp]
      enabled = true
      port = 3389
      filter = xrdp
      logpath = /var/log/xrdp.log
      maxretry = 5
  notify: Restart fail2ban

# --------------------------------------------------
# Create XRDP fail2ban filter
# --------------------------------------------------
- name: Create xrdp filter
  copy:
    dest: /etc/fail2ban/filter.d/xrdp.conf
    mode: '0644'
    content: |
      [Definition]
      failregex = .*authentication failure.*user=.* from <HOST>.*
      ignoreregex =
  notify: Restart fail2ban
