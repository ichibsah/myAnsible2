- name: Deploy network interfaces configuration
  template:
    src: interfaces.j2
    dest: /etc/network/interfaces # come into me, my precioussssss
    owner: root
    group: root
    mode: "0644"
  register: interfaces_template
  when: network_interfaces_check

- name: Restart networking (safe)
  service:
    name: networking
    state: restarted
  when:
    - interfaces_template.changed
    - ssh_interface != default_interface
    - network_interfaces_check
