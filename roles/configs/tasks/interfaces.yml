- name: Job 01.7.3 | Copy network folder to target host that matches "inventory_hostname"
  copy:
    src: "files/{{inventory_hostname}}/etc/network"
    dest: "/etc/"
    owner: root
    group: root
    mode: "0644"
  # when: inventory_hostname != 'virthost01'
  notify:
    - Restart networking
    - Restart docker
