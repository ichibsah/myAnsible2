- name: Ensure GNOME remote desktop is installed
  ansible.builtin.apt:
    name: "{{ gnome_packages }}"
    state: present
    update_cache: true

# --- Ensure certificate directory exists ---
- name: Create RDP cert directory
  ansible.builtin.file:
    path: "{{ gnome_rdp_cert_path }}"
    state: directory
    owner: "{{ gnome_rdp_user }}"
    mode: '0700'

# --- Generate TLS cert if missing ---
- name: Generate TLS key/cert for RDP
  ansible.builtin.shell: |
    openssl req -new -x509 -nodes \
    -newkey ec \
    -pkeyopt ec_paramgen_curve:P-384 \
    -keyout {{ gnome_rdp_cert_path }}/rdp-tls.key \
    -out {{ gnome_rdp_cert_path }}/rdp-tls.crt \
    -days 3650 \
    -subj "/CN={{ inventory_hostname }}"
  args:
    creates: "{{ gnome_rdp_cert_path }}/rdp-tls.key"
  become: true
  become_user: "{{ gnome_rdp_user }}"
