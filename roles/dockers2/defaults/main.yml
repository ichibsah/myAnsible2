media_apps:
  overseerr:
    enabled: false
    image: ghcr.io/linuxserver/overseerr:latest
    container_name: overseerr
    port: "5055:5055"
    config_dir: /opt/docker/overseerr/config
    restart: always
    env:
      - TZ=Europe/Berlin

  seerr:
    enabled: false
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    port: "5056:5055"
    config_dir: /opt/docker/seerr/config
    restart: unless-stopped
    env:
      - LOG_LEVEL=debug
      - TZ=Asia/Tashkent
      - PORT=5055
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1"]
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3

backup_retention_days: 7
telegram_enabled: false
telegram_token: ""
telegram_chat_id: ""
