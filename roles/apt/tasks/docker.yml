###############################################################################
# Docker installation and removal
# Reference:
# https://computingforgeeks.com/install-docker-ce-on-linux-systems/
###############################################################################

# -----------------------------------------------------------------------------
# Add Docker CE APT repository (universal repo for all supported Debian releases)
# -----------------------------------------------------------------------------
- name: Job 20.01 | Add Docker CE APT repository
  apt_repository:
    repo: >-
      deb [arch={{ [ansible_architecture]
                   | map('extract', deb_architecture)
                   | first }}]
      https://download.docker.com/{{ ansible_system | lower }}/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} stable
    state: present
    mode: "0644"
    update_cache: true
    validate_certs: true

# -----------------------------------------------------------------------------
# Ensure required Python tooling is installed system-wide
# -----------------------------------------------------------------------------
- name: Job 20.03 | Install system Python and pip packages
  apt:
    pkg:
      - python3
      - python3-apt
      - python3-pip
      - python3-full
      - pip
    state: latest

# -----------------------------------------------------------------------------
# Install Docker packages via APT
# -----------------------------------------------------------------------------
- name: Job 20.04 | Install Docker packages
  apt:
    pkg: "{{ apt_docker_pckg_lst }}"
    state: present
  when: instl_docker_pckg

# -----------------------------------------------------------------------------
# Install Docker Python modules (required for Ansible docker_* modules)
# -----------------------------------------------------------------------------
- name: Job 20.05 | Install Docker Python modules
  pip:
    name: "{{ pip_dckr_pckg_lst }}"
    state: present
  when: instl_docker_pckg

# -----------------------------------------------------------------------------
# Remove Docker packages (cleanup mode)
# -----------------------------------------------------------------------------
- name: Job 20.07 | Remove Docker APT packages
  apt:
    pkg: "{{ apt_docker_pckg_lst }}"
    state: absent
  when: not instl_docker_pckg and not kill_remove

- name: Job 20.08 | Remove Docker Python modules
  pip:
    name: "{{ pip_dckr_pckg_lst }}"
    state: absent
  when: not instl_docker_pckg and not kill_remove

###############################################################################
# User and group configuration
# These tasks must run last
###############################################################################

# -----------------------------------------------------------------------------
# Ensure docker group exists
# -----------------------------------------------------------------------------
- name: Job 21.98 | Ensure docker group exists
  group:
    name: docker
    state: present

# -----------------------------------------------------------------------------
# Add user to docker group
# -----------------------------------------------------------------------------
- name: Job 21.99 | Add user to docker group
  user:
    name: ibrahim
    groups: docker
    append: true
