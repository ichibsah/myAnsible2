
# Improved Ansible tasks with cross-OS support (Ubuntu/Debian/Fedora/RHEL)
# Comments included

- name: Ensure resolv configuration is applied
  ansible.builtin.import_tasks:
    file: resolv.yml
  tags:
    - resolv
    - localhost

- name: Ensure package configuration is applied
  ansible.builtin.import_tasks:
    file: pckgs.yml

# Import additional modules
- name: Import Docker tasks
  ansible.builtin.import_tasks: file=docker.yml

- name: Import Filebot tasks
  ansible.builtin.import_tasks: file=filebot.yml

- name: Import Vector tasks
  ansible.builtin.import_tasks: file=vector.yml
  when: instl_def_pckg and instl_vctr

# Reboot last
- name: Reboot system
  ansible.builtin.import_tasks: file=reboot.yml
