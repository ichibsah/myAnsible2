---
- name: PROVISIONS | First time Initialisation
  hosts: allservers
  gather_facts: true
  ignore_errors: true
  ignore_unreachable: true
  # remote_user: root
  remote_user: ibrahim
  become: true
  become_user: root
  roles:
    - provisions
    - ssh

